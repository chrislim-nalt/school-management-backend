services:
  - type: web
    name: school-management-system
    runtime: node
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true